server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (PDFs, EPUBs, images)
    client_max_body_size 200M;

    # Gzip compression for text assets (JS/CSS/JSON/SVG)
    gzip on;
    gzip_types text/plain text/css application/javascript text/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: 'unsafe-inline'/'unsafe-eval' needed by TinyMCE & pdfjs; CDN hosts for the
    # epub.js preview iframe (srcdoc inherits this CSP); data:/blob: for images & object URLs.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: https://cdn.jsdelivr.net; frame-src 'self' blob:; object-src 'none'; base-uri 'self'" always;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:3999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        # Long timeout for EPUBCheck and ace validation
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    # SPA fallback: all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # pdf.js worker ships as .mjs — nginx:alpine mime.types has no .mjs entry,
    # so it falls back to application/octet-stream and the browser rejects the
    # module script under strict MIME checking. Force a JS MIME type.
    location ~* \.mjs$ {
        default_type text/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
